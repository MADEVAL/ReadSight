name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: PHP 8.5 — Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, json

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP CS Fixer
        run: composer cs:check

      - name: PHPUnit (Unit only)
        run: php -d memory_limit=256M vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Unit --no-coverage

      - name: PHPUnit (Integration only)
        run: php -d memory_limit=256M vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration --no-coverage

      - name: PHPUnit (Regression only)
        run: php -d memory_limit=256M vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Regression --no-coverage
