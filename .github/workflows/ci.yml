name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: PHP ${{ matrix.php }} — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.5'
            name: 'Check (CS + PHPStan + Tests)'
          - php: '8.5'
            name: 'Mutation Testing'
            infection: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP CS Fixer
        run: composer cs:check

      - name: PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        run: composer test

      - name: Infection (mutation testing)
        if: ${{ matrix.infection }}
        run: php -d memory_limit=512M vendor/bin/infection --threads=4 --min-msi=45 --min-covered-msi=50
        continue-on-error: true
