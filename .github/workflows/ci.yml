name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: PHP 8.5 — Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, json

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Unit tests
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Unit --no-coverage

      - name: EngineIntegrationTest
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration/EngineIntegrationTest.php --no-coverage

      - name: EngineTest
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration/EngineTest.php --no-coverage

      - name: FormulaIntegrationTest
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration/FormulaIntegrationTest.php --no-coverage

      - name: MultilingualIntegrationTest
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration/MultilingualIntegrationTest.php --no-coverage

      - name: Regression tests
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Regression --no-coverage
