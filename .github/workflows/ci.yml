name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: PHP ${{ matrix.php }} - Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP CS Fixer
        continue-on-error: true
        run: composer cs:check

      - name: Unit tests
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Unit --no-coverage

      - name: Integration tests
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration --no-coverage --exclude-group slow

      - name: Slow integration tests
        continue-on-error: true
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Integration --no-coverage --group slow

      - name: Regression tests
        run: php vendor/phpunit/phpunit/phpunit --no-configuration --bootstrap vendor/autoload.php tests/Regression --no-coverage
